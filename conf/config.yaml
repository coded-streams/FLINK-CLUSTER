# ===================================================
# Flink Cluster Configuration with MinIO Checkpointing
# ===================================================

# ======================
# Cluster Basics
# ======================
jobmanager.rpc.address: codedstream-jobmanager
rest.port: 8081
rest.bind-address: 0.0.0.0
taskmanager.numberOfTaskSlots: 10
parallelism.default: 1

# ======================
# S3/MinIO Configuration
# ======================
s3.endpoint: http://minio:9000
s3.path.style.access: true
s3.access-key: minio
s3.secret-key: minio123

fs.s3a.endpoint: http://minio:9000
fs.s3a.path.style.access: true
fs.s3a.access.key: minio
fs.s3a.secret.key: minio123
fs.s3a.connection.ssl.enabled: false
fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider


# ======================
# State Backend & Checkpoints
# ======================
# State backend configuration
state.backend: rocksdb
state.backend.incremental: true

# Checkpoint directories
state.checkpoints.dir: s3://flink-checkpoints/checkpoints
state.savepoints.dir: s3://flink-checkpoints/savepoints

# Checkpoint configuration
execution.checkpointing.interval: 10s
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 10min
execution.checkpointing.min-pause: 5s
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.unaligned: true
execution.checkpointing.tolerable-failed-checkpoints: 3

# ======================
# RocksDB Configuration
# ======================
state.backend.rocksdb.localdir: /tmp/flink-rocksdb
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.predefined-options: SPINNING_DISK_OPTIMIZED
state.backend.rocksdb.options.max_write_buffer_number: 4
state.backend.rocksdb.options.write_buffer_size: 128m
state.backend.rocksdb.options.max_background_compactions: 2

# ======================
# Memory Configuration
# ======================
taskmanager.memory.process.size: 1728m
taskmanager.memory.managed.fraction: 0.4
jobmanager.memory.process.size: 1600m

# ======================
# Restart Strategy
# ======================
restart-strategy: fixed-delay
restart-strategy.fixed-delay.attempts: 3
restart-strategy.fixed-delay.delay: 10s

# ======================
# High Availability (Optional)
# ======================
# high-availability: org.apache.flink.runtime.highavailability.StandaloneHAServices
# high-availability.storageDir: s3://flink-checkpoints/ha/