services:
  # ══════════════════════════════════════════
  #  Flink JobManager
  # ══════════════════════════════════════════
  codedstream-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-jobmanager
    command: ["jobmanager"]
    ports:
      - "8012:8081"
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/config.yaml:/opt/flink/conf/config.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/overview"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ══════════════════════════════════════════
  #  Flink TaskManager 1
  # ══════════════════════════════════════════
  codedstream-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-taskmanager
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: ["taskmanager"]
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/config.yaml:/opt/flink/conf/config.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02

  # ══════════════════════════════════════════
  #  Flink TaskManager 2
  # ══════════════════════════════════════════
  codedstream-taskmanager-2:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-taskmanager-2
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: ["taskmanager"]
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/config.yaml:/opt/flink/conf/config.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02

  # ══════════════════════════════════════════
  #  Flink SQL Gateway
  # ══════════════════════════════════════════
  flink-sql-gateway:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-sql-gateway
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo "Copying connectors..." &&
        cp /opt/flink/plugins/connectors/*.jar /opt/flink/lib/ 2>/dev/null || true &&
        echo "Starting SQL Gateway..." &&
        exec /opt/flink/bin/sql-gateway.sh start-foreground
    ports:
      - "8083:8083"
    volumes:
      - ./conf/config.yaml:/opt/flink/conf/config.yaml:ro
      - ./connectors:/opt/flink/plugins/connectors
      - udf-jars:/var/www/udf-jars
    networks:
      - kafka-network-02
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ══════════════════════════════════════════
  #  CORS Proxy  (browser → SQL Gateway)
  # ══════════════════════════════════════════
  flink-gateway-cors-proxy:
    image: nginx:1.25-alpine
    container_name: flink-gateway-cors-proxy
    depends_on:
      flink-sql-gateway:
        condition: service_healthy
    ports:
      - "8084:8084"
    volumes:
      - ./nginx/flink-cors.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kafka-network-02
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ══════════════════════════════════════════
  #  Flink SQL Client (optional CLI access)
  # ══════════════════════════════════════════
  codedstream-sql-client:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-sql-client
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for Flink cluster ...';
        while ! nc -z codedstream-jobmanager 8081; do sleep 1; done;
        /opt/flink/bin/sql-client.sh embedded
      "
    volumes:
      - ./conf/config.yaml:/opt/flink/conf/config.yaml:ro
      - ./sql-scripts:/opt/flink/sql-scripts
      - ./connectors:/opt/flink/plugins/connectors
    stdin_open: true
    tty: true
    networks:
      - kafka-network-02

volumes:
  udf-jars:

networks:
  kafka-network-02:
    external: true