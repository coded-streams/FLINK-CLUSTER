services:
  # ══════════════════════════════════════════
  #  Flink JobManager
  # ══════════════════════════════════════════
  codedstream-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-jobmanager
    command: ["jobmanager"]
    ports:
      - "8012:8081"            # JobManager UI → http://localhost:8012
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: codedstream-jobmanager
        rest.port: 8081
        rest.bind-address: 0.0.0.0
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
        state.backend: rocksdb
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        state.savepoints.dir: s3://flink-checkpoints/savepoints
        execution.checkpointing.interval: 10000
        execution.checkpointing.mode: EXACTLY_ONCE
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/overview"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ══════════════════════════════════════════
  #  Flink TaskManager 1
  # ══════════════════════════════════════════
  codedstream-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-taskmanager
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: ["taskmanager"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: codedstream-jobmanager
        taskmanager.numberOfTaskSlots: 8
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02

  # ══════════════════════════════════════════
  #  Flink TaskManager 2
  # ══════════════════════════════════════════
  codedstream-taskmanager-2:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: codedstream-taskmanager-2
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: ["taskmanager"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: codedstream-jobmanager
        taskmanager.numberOfTaskSlots: 8
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    volumes:
      - ./plugins/s3-fs-hadoop:/opt/flink/plugins/s3-fs-hadoop
      - ./conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./models:/opt/flink/models
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02

  # ══════════════════════════════════════════
  #  Flink SQL Gateway
  # ══════════════════════════════════════════
  flink-sql-gateway:
    image: flink:1.19.1-scala_2.12-java11
    container_name: flink-sql-gateway
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo "Copying connectors..." &&
        cp /opt/flink/plugins/connectors/*.jar /opt/flink/lib/ 2>/dev/null || true &&
        echo "Starting SQL Gateway..." &&
        exec /opt/flink/bin/sql-gateway.sh start-foreground \
          -Dsql-gateway.endpoint.rest.address=0.0.0.0 \
          -Dsql-gateway.endpoint.rest.port=8083 \
          -Dexecution.target=remote \
          -Drest.address=codedstream-jobmanager \
          -Drest.port=8081 \
          -Djobmanager.rpc.address=codedstream-jobmanager
    ports:
      - "8083:8083"
    volumes:
      - ./connectors:/opt/flink/plugins/connectors
    networks:
      - kafka-network-02
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ══════════════════════════════════════════
  #  CORS Proxy  (browser → SQL Gateway)
  # ══════════════════════════════════════════
  flink-gateway-cors-proxy:
    image: nginx:1.25-alpine
    container_name: flink-gateway-cors-proxy
    depends_on:
      flink-sql-gateway:
        condition: service_healthy
    ports:
      - "8084:8084"
    volumes:
      - ./nginx/flink-cors.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kafka-network-02
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ══════════════════════════════════════════
  #  FlinkSQL Studio Web IDE
  # ══════════════════════════════════════════
  flink-studio:
    image: nginx:1.25-alpine
    container_name: flink-studio
    ports:
      - "3030:80"
    volumes:
      - ./studio/flink-sql-ide.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/studio.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kafka-network-02
    restart: unless-stopped
    depends_on:
      flink-gateway-cors-proxy:
        condition: service_healthy

  # ══════════════════════════════════════════
  #  Flink SQL Client (optional CLI access)
  # ══════════════════════════════════════════
  codedstream-sql-client:
    image: flink:1.19.1-scala_2.12-java11
    container_name: flink-sql-client
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for Flink cluster ...';
        while ! nc -z codedstream-jobmanager 8081; do sleep 1; done;
        /opt/flink/bin/sql-client.sh embedded
      "
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: codedstream-jobmanager
        rest.address: codedstream-jobmanager
        rest.port: 8081
        execution.target: remote
    volumes:
      - ./sql-scripts:/opt/flink/sql-scripts
      - ./connectors:/opt/flink/plugins/connectors
    stdin_open: true
    tty: true
    networks:
      - kafka-network-02

  # ══════════════════════════════════════════
  #  StreamPark
  # ══════════════════════════════════════════
  streampark:
    image: apache/streampark:v2.1.5
    container_name: streampark
    depends_on:
      codedstream-jobmanager:
        condition: service_healthy
      flink-sql-gateway:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 10000
      SERVER_ADDRESS: 0.0.0.0
      DATASOURCE_DIALECT: h2
      STREAMPARK_FLINK_REST_URL: http://codedstream-jobmanager:8081
      STREAMPARK_FLINK_SQL_GATEWAY_URL: http://flink-sql-gateway:8083
      STREAMPARK_AUTO_REGISTER_CLUSTER: "true"
      STREAMPARK_FLINK_VERSION: "1.19.1"
    ports:
      - "10000:10000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hosts:/etc/hosts:ro
      - ~/.kube:/root/.kube:ro
      - ./streampark-data:/opt/streampark/data
      - ./flink-versions:/opt/streampark/flink
      - ./connectors:/opt/flink/plugins/connectors
    privileged: true
    restart: always
    networks:
      - kafka-network-02
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:10000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  udf-jars:
  
networks:
  kafka-network-02:
    external: true