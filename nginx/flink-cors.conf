# =============================================================
# nginx/flink-cors.conf  (FIXED — v2.1)
#
# Two responsibilities:
#   1. Proxy browser → Flink SQL Gateway (port 8083)
#   2. Serve /udf-jars/ with WebDAV PUT so:
#        - Browser can upload JARs  (PUT from Studio UI)
#        - SQL Gateway can fetch them via HTTP on Docker network:
#          ADD JAR 'http://flink-gateway-cors-proxy:8084/udf-jars/x.jar'
#
# NOTE: uses `root /var/www` (NOT alias) for the /udf-jars/ location.
# nginx's dav module resolves paths relative to `root`, so the request
# URI /udf-jars/foo.jar maps correctly to /var/www/udf-jars/foo.jar.
# Using `alias` here causes 403/405 on nginx:alpine.
# =============================================================

upstream flink_gateway {
    server flink-sql-gateway:8083;
    keepalive 32;
}

server {
    listen 8084;
    server_name _;

    client_max_body_size 512m;

    # ── Global CORS ───────────────────────────────────────────
    add_header 'Access-Control-Allow-Origin'      '*'                                                       always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS, PATCH'                 always;
    add_header 'Access-Control-Allow-Headers'     'Content-Type, Accept, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Expose-Headers'    'Content-Type, Content-Length, X-Total-Count'            always;
    add_header 'Access-Control-Max-Age'           '86400'                                                  always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ══════════════════════════════════════════════════════════
    # /udf-jars/ — JAR storage
    #
    # Browser PUTs here via:  http://localhost:8084/udf-jars/
    # Gateway fetches via:    http://flink-gateway-cors-proxy:8084/udf-jars/
    #
    # Both resolve to /var/www/udf-jars/ inside this container.
    # The docker-compose entrypoint creates this dir and chowns it to nginx.
    # ══════════════════════════════════════════════════════════
    location /udf-jars/ {
        root /var/www;

        dav_methods          PUT DELETE;
        dav_access           user:rw group:rw all:r;
        create_full_put_path on;

        autoindex            on;
        autoindex_format     json;
        autoindex_exact_size on;
        autoindex_localtime  off;

        client_max_body_size 512m;
        send_timeout         300s;

        add_header 'Access-Control-Allow-Origin'  '*'                               always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, OPTIONS, HEAD' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization'     always;
    }

    # ── Flink SQL Gateway proxy ───────────────────────────────
    location / {
        proxy_pass         http://flink_gateway;
        proxy_http_version 1.1;

        proxy_set_header   Connection        '';
        proxy_set_header   Host              'flink-sql-gateway:8083';
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering             off;
        proxy_request_buffering     off;
        proxy_cache                 off;

        proxy_connect_timeout   15s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        client_max_body_size    512m;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
    }

    # ── Health check ──────────────────────────────────────────
    location = /nginx-health {
        access_log  off;
        add_header  Content-Type 'application/json' always;
        return 200  '{"status":"ok","udf-jars":"enabled"}';
    }

    error_page 502 = @upstream_error;
    error_page 503 = @upstream_error;
    error_page 504 = @upstream_error;

    location @upstream_error {
        internal;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization' always;
        add_header 'Content-Type'                 'application/json' always;
        return 502 '{"error":"Flink SQL Gateway unreachable","status":502}';
    }
}