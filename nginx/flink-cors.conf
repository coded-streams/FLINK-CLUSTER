# =============================================================
# nginx/flink-cors.conf  (FIXED)
# Adds CORS headers to ALL responses including errors and 502s
# =============================================================

# Upstream definition — allows nginx to detect upstream failures
upstream flink_gateway {
    server flink-sql-gateway:8083;
    keepalive 32;
}

server {
    listen 8084;
    server_name _;

    # ── Global: always add these headers to every response ───
    # 'always' keyword means: add even on error responses (4xx, 5xx)
    add_header 'Access-Control-Allow-Origin'      '*'                                                          always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS, PATCH'                    always;
    add_header 'Access-Control-Allow-Headers'     'Content-Type, Accept, Authorization, X-Requested-With'    always;
    add_header 'Access-Control-Expose-Headers'    'Content-Type, Content-Length, X-Total-Count'               always;
    add_header 'Access-Control-Max-Age'           '86400'                                                     always;

    # ── Handle OPTIONS preflight ──────────────────────────────
    # Must be handled BEFORE proxy_pass, otherwise nginx tries
    # to proxy the OPTIONS to Flink which may not handle it.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Main proxy location ───────────────────────────────────
    location / {
        proxy_pass         http://flink_gateway;
        proxy_http_version 1.1;

        # Keep connections alive for polling
        proxy_set_header   Connection        '';
        proxy_set_header   Host              'flink-sql-gateway:8083';
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering — critical for streaming result polling
        proxy_buffering             off;
        proxy_request_buffering     off;
        proxy_cache                 off;

        # Timeouts — long for slow SQL operations
        proxy_connect_timeout   15s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        # Allow large SQL payloads
        client_max_body_size    50m;

        # Remove any existing CORS headers from upstream
        # (prevents duplicate headers if Flink also sends them)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
    }

    # ── Health check (does NOT proxy to Flink) ────────────────
    location = /nginx-health {
        access_log  off;
        add_header  Content-Type 'application/json' always;
        return 200  '{"status":"nginx-ok","proxy":"flink-gateway-cors","upstream":"flink-sql-gateway:8083"}';
    }

    # ── Custom 502/503/504 with CORS headers ─────────────────
    error_page 502 = @upstream_error;
    error_page 503 = @upstream_error;
    error_page 504 = @upstream_error;

    location @upstream_error {
        internal;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization' always;
        add_header 'Content-Type'                 'application/json' always;
        return 502 '{"error":"Flink SQL Gateway unreachable","message":"The flink-sql-gateway container is not responding. Check: docker compose ps","status":502}';
    }
}