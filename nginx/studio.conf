# =============================================================
# nginx/studio.conf
# Serves FlinkSQL Studio + proxies Flink API calls same-origin
# =============================================================

server {
    listen 80;
    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Flink SQL Gateway API (sessions, statements, results) ─
    location /flink-api/ {
        proxy_pass         http://flink-sql-gateway:8083/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              'flink-sql-gateway:8083';
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache             off;
        proxy_connect_timeout   15s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;
        client_max_body_size    50m;
    }

    # ── JobManager REST API (metrics, jobs, overview) ────────
    # Used by the Performance Monitor panel
    location /jobmanager-api/ {
        proxy_pass         http://codedstream-jobmanager:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              'codedstream-jobmanager:8081';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # ── IDE HTML ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /ping {
        access_log off;
        return 200 'pong';
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}